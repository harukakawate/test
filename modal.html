<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>モーダルテスト</title>
  <!-- shutto翻訳 -->
  <script src="https://staging-d.ea-shutto-translation.net/trans.js?id=1411"></script>
  <!-- ここからモーダルスクリプトテスト -->
<script>
__stt.on('selectLang', function(event) {
    // === 1. HTML構造の作成 ===
    const overlay = document.createElement('div');
    overlay.id = 'custom-modal-overlay';

    const modal = document.createElement('div');
    modal.id = 'custom-modal';

    modal.innerHTML = `
        <div class="modal-header">&lt;翻訳について&gt;</div>
        <hr class="modal-divider">
        <div class="modal-body">
            自動翻訳サービスを利用して、ホームページを翻訳します。<br>
            本サービスは自動翻訳システムであるため、正しく翻訳されない場合があり、翻訳前のページの本来の内容と異なることがあります。<br>
            また、本サービスのご利用により生じた直接的または間接的な損害について、当社は一切の責任を負いません。あらかじめご了承ください。
        </div>
        <div class="modal-footer">
            <button class="btn-submit" id="modal-btn-submit">言語を切り替える</button>
            <button class="btn-cancel" id="modal-btn-cancel">キャンセル</button>
        </div>
    `;

    overlay.appendChild(modal);
    document.body.appendChild(overlay);

    // === 2. CSSスタイルの適用 ===
    const style = document.createElement('style');
    style.innerHTML = `
        #custom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }
        #custom-modal {
            background-color: #ffffff;
            width: 90%;
            max-width: 500px;
            padding: 30px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            box-sizing: border-box;
            text-align: left;
        }
        #custom-modal .modal-header {
            color: #d32f2f;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 12px;
        }
        #custom-modal .modal-divider {
            border: 0;
            border-top: 1px solid #ccc;
            margin-bottom: 20px;
        }
        #custom-modal .modal-body {
            font-size: 12px;
            line-height: 1.6;
            color: #333333;
            margin-bottom: 25px;
            word-break: break-all;
        }
        #custom-modal .modal-footer {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        #custom-modal .modal-footer button {
            border: none;
            padding: 8px 24px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 2px;
            min-width: 100px;
        }
        #custom-modal .btn-submit {
            background-color: #009688;
            color: #ffffff;
        }
        #custom-modal .btn-submit:hover {
            background-color: #00796b;
        }
        #custom-modal .btn-cancel {
            background-color: #e0e0e0;
            color: #333333;
        }
        #custom-modal .btn-cancel:hover {
            background-color: #d5d5d5;
        }
    `;
    document.head.appendChild(style);

    // === 3. ボタンのイベント処理 ===
    function closeModal() {
        overlay.remove();
        style.remove();
    }

    // キャンセルボタン押下時
    document.getElementById('modal-btn-cancel').addEventListener('click', function() {
        closeModal();

        __stt.set('lang', 'ja');
        if (location.search.match(/\?from\=(.*)/)) {
            location.href = location.search.match(/\?from\=(.*)/)[1];
        }
    });

    // 言語切り替え（確定）ボタン押下時
    document.getElementById('modal-btn-submit').addEventListener('click', function() {
        closeModal();
        console.log('Language transition confirmed.');
    });
});
</script>
</head>
<body>
  <main>
    <link rel="stylesheet" href="style/test.css">
    <h1>これはサンプルのページです</h1>
    <div>テストです</div>
  </main>
</body>
</html>
